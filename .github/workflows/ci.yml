name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: Pipeline (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hapi
          POSTGRES_USER: hapi
          POSTGRES_PASSWORD: hapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hapi:hapi@localhost:5432/hapi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -v

  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    needs: pipeline
    defaults:
      run:
        working-directory: web
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hapi
          POSTGRES_USER: hapi
          POSTGRES_PASSWORD: hapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://hapi:hapi@localhost:5432/hapi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run pipeline migrations to create DB tables, then introspect with Drizzle
      - name: Run pipeline migrations
        working-directory: pipeline
        run: uv sync && uv run alembic upgrade head

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
